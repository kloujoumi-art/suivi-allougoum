<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جماعة الوكوم — قائمة الناخبين</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Cairo', sans-serif; }

    :root {
      --rose:   #be123c;
      --rose-h: #9f1239;
      --rose-l: #fda4af;
      --black:  #0f0f0f;
      --dark:   #1c1c1c;
    }

    body { background: #fdf2f5; min-height: 100vh; }

    /* ── SIDEBAR ── */
    #sidebar {
      background: linear-gradient(160deg, #0f0f0f 0%, #1c1c1c 100%);
      border-left: 3px solid var(--rose);
      transition: transform .28s ease;
    }
    .nav-link { display:flex; align-items:center; gap:.75rem; padding:.75rem 1rem;
      border-radius:.75rem; color:#d1d5db; font-weight:700; cursor:pointer;
      transition:background .15s,color .15s; }
    .nav-link:hover { background:#be123c22; color:#fff; }
    .nav-link.active { background:var(--rose); color:#fff; box-shadow:0 4px 14px #be123c55; }

    /* ── MOBILE SIDEBAR DRAWER ── */
    #sidebarOverlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.55); z-index:98;
    }
    #sidebarOverlay.open { display:block; }

    @media (max-width: 767px) {
      #sidebar {
        position: fixed !important;
        top: 0 !important;
        right: -280px;
        height: 100vh !important;
        width: 260px !important;
        z-index: 99;
        transition: right .28s ease;
      }
      #sidebar.open { right: 0; }
      #main-wrap { margin-right: 0 !important; }
    }
    @media (min-width: 768px) {
      #menuBtn { display: none !important; }
      #mobileSearchBar { display: none !important; }
    }

    /* ── TOP BANNER ── */
    #topBanner {
      background: linear-gradient(90deg, #0f0f0f 0%, #1c1c1c 60%, #be123c 100%);
      border-bottom: 3px solid var(--rose);
    }

    /* ── CARDS ── */
    .card { background:#fff; border-radius:1.25rem; box-shadow:0 2px 12px #be123c0d; }

    /* ── BUTTONS ── */
    .btn-rose { background:var(--rose); color:#fff; border-radius:.75rem; font-weight:700; padding:.5rem 1.25rem; transition:background .15s; }
    .btn-rose:hover { background:var(--rose-h); }
    .btn-dark { background:#1c1c1c; color:#fff; border-radius:.75rem; font-weight:700; padding:.5rem 1.25rem; transition:background .15s; }
    .btn-dark:hover { background:#2d2d2d; }

    /* ── MODAL ── */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:60; align-items:center; justify-content:center; }
    .overlay.open { display:flex; }

    /* ── TABLE ── */
    .tbl-head { background:#0f0f0f; color:#fff; }
    .tbl-row:nth-child(odd)  { background:#fff; }
    .tbl-row:nth-child(even) { background:#fdf2f5; }
    .tbl-row:hover { background:#ffe4e6; }

    /* ── BADGE ── */
    .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.72rem; font-weight:700; }
    .badge-rose  { background:#ffe4e6; color:#9f1239; }
    .badge-dark  { background:#e5e7eb; color:#1f2937; }
    .badge-green { background:#d1fae5; color:#065f46; }

    /* ── INPUT ── */
    .inp { width:100%; border:2px solid #fca5a5; border-radius:.75rem; padding:.6rem 1rem;
      outline:none; font-size:.875rem; font-weight:600; transition:border-color .15s; direction:rtl; }
    .inp:focus { border-color:var(--rose); box-shadow:0 0 0 3px #be123c22; }

    /* ── CAMPAIGN BUTTONS ── */
    .pos-btn { transition:all .15s ease; border-radius:.5rem; font-size:.72rem; font-weight:700; padding:.25rem .6rem; border:2px solid transparent; cursor:pointer; }
    .pos-btn:active { transform:scale(.94); }
    .pos-maana   { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .pos-maana.active   { background:#059669; color:#fff; border-color:#059669; box-shadow:0 2px 8px #05966955; }
    .pos-mutar   { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
    .pos-mutar.active   { background:#d97706; color:#fff; border-color:#d97706; box-shadow:0 2px 8px #d9770655; }
    .pos-didd    { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
    .pos-didd.active    { background:#dc2626; color:#fff; border-color:#dc2626; box-shadow:0 2px 8px #dc262655; }
    .row-maana   { background:#f0fdf4 !important; }
    .row-mutar   { background:#fffbeb !important; }
    .row-didd    { background:#fff1f2 !important; }

    /* ── MISC ── */
    .fade-in { animation:fi .25s ease; }
    @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .winner-banner { background:linear-gradient(135deg,#fbbf24,#f59e0b); border:2px solid #d97706; animation:glow 1.6s ease-in-out infinite; }
    @keyframes glow { 0%,100%{box-shadow:0 0 0 0 #f59e0b55} 50%{box-shadow:0 0 18px 4px #f59e0b44} }
    .loser-banner  { background:linear-gradient(135deg,#ef4444,#dc2626); border:2px solid #b91c1c; animation:glowred 1.6s ease-in-out infinite; }
    @keyframes glowred { 0%,100%{box-shadow:0 0 0 0 #dc262655} 50%{box-shadow:0 0 18px 4px #dc262644} }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:#be123c66; border-radius:3px; }
    .bar { height:.5rem; border-radius:999px; background:linear-gradient(90deg,var(--rose),var(--rose-l)); }
    input[type=checkbox] { accent-color: var(--rose); }

    /* ── RESPONSIVE TABLE ── */
    .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    @media (max-width: 639px) {
      .pos-btn { padding:.2rem .35rem; font-size:.65rem; }
      .hide-xs { display:none !important; }
    }
  </style>
</head>
<body>

<!-- ══════════════ TOP BANNER ══════════════ -->
<div id="topBanner" class="flex items-center gap-3 px-4 py-2 md:px-6 md:py-3">
  <!-- Hamburger (mobile only) -->
  <button id="menuBtn" onclick="toggleSidebar()"
    class="flex items-center justify-center w-10 h-10 rounded-xl text-white text-2xl font-black hover:bg-white/20 transition flex-shrink-0"
    style="display:none">☰</button>

  <img
    src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Logo_-_Parti_de_l%27Istiqlal.png/120px-Logo_-_Parti_de_l%27Istiqlal.png"
    alt="حزب الاستقلال"
    class="h-10 w-10 md:h-14 md:w-14 object-contain rounded-full bg-white p-1 shadow-lg border-2 flex-shrink-0"
    style="border-color:var(--rose)"
  />
  <div class="min-w-0">
    <div class="text-white font-black text-sm md:text-lg leading-tight truncate">حزب الاستقلال — جماعة الوكوم</div>
    <div class="text-xs hidden sm:block" style="color:var(--rose-l)">إقليم طاطا &nbsp;|&nbsp; نظام إدارة قوائم الناخبين</div>
  </div>

  <div class="flex-1"></div>

  <!-- Desktop: search + campaign link -->
  <input id="globalSearch" type="text" placeholder="🔍 بحث سريع..."
    class="inp hidden md:block w-52 bg-white bg-opacity-10 text-white placeholder-rose-200"
    style="border-color:#be123c88;color:#fff"
    onfocus="this.style.borderColor='#fff'" onblur="this.style.borderColor='#be123c88'" />

  <a href="/campaign.html" target="_blank"
    class="hidden sm:flex items-center gap-2 text-white font-black text-sm px-3 md:px-4 py-2 rounded-xl transition-all whitespace-nowrap flex-shrink-0"
    style="background:#be123c;border:2px solid #fff3;box-shadow:0 2px 12px #be123c88"
    onmouseover="this.style.background='#9f1239'" onmouseout="this.style.background='#be123c'">
    🎯 <span class="hidden lg:inline">إدارة الحملة</span>
  </a>

  <button onclick="doLogout()"
    class="flex items-center gap-1 text-gray-400 hover:text-white text-sm px-3 py-2 rounded-xl transition-all whitespace-nowrap flex-shrink-0 hover:bg-white/10"
    title="تسجيل الخروج">
    🚪 <span class="hidden md:inline">خروج</span>
  </button>
</div>

<!-- Mobile search bar -->
<div id="mobileSearchBar" class="px-3 py-2 md:hidden" style="background:#1c1c1c;border-bottom:2px solid #be123c33">
  <input id="globalSearchMobile" type="text" placeholder="🔍 بحث سريع..."
    class="inp text-sm" style="background:#2d2d2d;color:#fff;border-color:#be123c55"
    onfocus="this.style.borderColor='#be123c'" onblur="this.style.borderColor='#be123c55'" />
</div>

<!-- Sidebar overlay -->
<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ══════════════ LAYOUT ══════════════ -->
<div id="main-wrap" class="flex" style="min-height:calc(100vh - 73px)">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="w-60 flex-shrink-0 flex flex-col shadow-2xl sticky top-0 h-screen overflow-y-auto" style="top:73px">
    <nav class="p-3 space-y-1 flex-1 pt-4">
      <a data-page="dashboard" class="nav-link active">
        <span class="text-xl">📊</span><span>لوحة التحكم</span>
      </a>
      <a data-page="voters" class="nav-link">
        <span class="text-xl">🗳️</span><span>قائمة الناخبين</span>
      </a>
      <a data-page="districts" class="nav-link">
        <span class="text-xl">🗺️</span><span>الدوائر</span>
      </a>
      <a data-page="douars" class="nav-link">
        <span class="text-xl">🏡</span><span>الدواوير</span>
      </a>
      <div class="mx-3 my-2 border-t" style="border-color:#be123c33"></div>
      <a data-page="campaign" class="nav-link">
        <span class="text-xl">🎯</span><span>إدارة الحملة</span>
      </a>
    </nav>
    <div class="p-3" style="border-top:1px solid #be123c33">
      <a href="/campaign.html" target="_blank"
        class="flex items-center justify-center gap-2 w-full py-2 rounded-xl font-black text-sm text-white transition-all"
        style="background:linear-gradient(135deg,#be123c,#9f1239);box-shadow:0 2px 10px #be123c55">
        🎯 فتح صفحة الحملة
      </a>
      <div class="text-center text-xs mt-2" style="color:#6b7280">حزب الاستقلال © 2026</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-3 md:p-6 overflow-x-hidden">
    <div id="page-dashboard" class="fade-in"></div>
    <div id="page-voters"    class="fade-in hidden"></div>
    <div id="page-districts" class="fade-in hidden"></div>
    <div id="page-douars"    class="fade-in hidden"></div>
    <div id="page-campaign"  class="fade-in hidden"></div>
  </main>
</div>

<!-- ══════════════ MODAL ══════════════ -->
<div id="modal" class="overlay" onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between p-5 rounded-t-2xl" style="background:#0f0f0f">
      <h2 id="modalTitle" class="text-white font-black text-lg"></h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-white text-3xl leading-none">&times;</button>
    </div>
    <div id="modalBody" class="p-5 space-y-4"></div>
    <div class="px-5 pb-5 flex gap-3 justify-end">
      <button onclick="closeModal()" class="border-2 border-gray-300 rounded-xl px-5 py-2 font-bold text-gray-600 hover:bg-gray-50">إلغاء</button>
      <button onclick="saveModal()" class="btn-rose">حفظ</button>
    </div>
  </div>
</div>

<!-- ══════════════ CONFIRM ══════════════ -->
<div id="confirmDlg" class="overlay" onclick="if(event.target===this)closeConfirm()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-7 text-center">
    <div class="text-5xl mb-3">⚠️</div>
    <p id="confirmMsg" class="text-gray-800 font-bold text-base mb-6"></p>
    <div class="flex gap-3 justify-center">
      <button onclick="closeConfirm()" class="border-2 border-gray-300 rounded-xl px-5 py-2 font-bold text-gray-600">إلغاء</button>
      <button id="confirmOk" class="bg-red-600 hover:bg-red-700 text-white rounded-xl px-6 py-2 font-black">تأكيد الحذف</button>
    </div>
  </div>
</div>

<!-- ══════════════ TOAST ══════════════ -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 md:left-6 md:translate-x-0 text-white px-5 py-3 rounded-xl shadow-2xl font-bold text-sm z-50 opacity-0 pointer-events-none transition-all duration-300 whitespace-nowrap" style="transform:translateY(12px)"></div>

<script>
async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
document.addEventListener('DOMContentLoaded', function() {
  // Close sidebar on nav link click (mobile)
  document.querySelectorAll('.nav-link').forEach(a =>
    a.addEventListener('click', () => { if (window.innerWidth < 768) closeSidebar(); })
  );
  // Mobile search syncs with desktop search
  const mob = document.getElementById('globalSearchMobile');
  if (mob) {
    let mt;
    mob.addEventListener('input', e => {
      clearTimeout(mt);
      mt = setTimeout(() => { if (e.target.value.trim().length > 1) globalSearch(e.target.value.trim()); }, 300);
    });
  }
});
</script>
<script src="/app.js"></script>
</body>
</html>
